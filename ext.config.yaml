operations:
  view:
    - type: web
      impl: index.html
actions: actions
web: web-src
runtimeManifest:
  database:
    auto-provision: true
    region: apac
  packages:
    customerotplogin:
      license: Apache-2.0
      actions:
        generic:
          function: actions/generic/index.js
          web: 'yes'
          runtime: nodejs:22
          inputs:
            LOG_LEVEL: debug
          annotations:
            require-adobe-auth: true
            final: true
        otp:
          function: actions/otp/otp.js
          web: 'yes'
          runtime: nodejs:22
          inputs:
            LOG_LEVEL: debug
            apikey: $SERVICE_API_KEY
            GRAPHQL_ENDPOINT: $GRAPHQL_ENDPOINT
            GRAPHQL_API_KEY: $GRAPHQL_API_KEY
          annotations:
            require-adobe-auth: true
            final: true
        app_config:
          function: actions/app_config/index.js
          web: 'yes'
          runtime: nodejs:22
          inputs:
            LOG_LEVEL: debug
            apikey: $SERVICE_API_KEY
          annotations:
            require-adobe-auth: true
            final: true
        registration:
          function: actions/registration/index.js
          web: 'yes'
          runtime: nodejs:22
          inputs:
            LOG_LEVEL: debug
          annotations:
            require-adobe-auth: false
            final: true
